<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Sagar Wellcome To DevOps Learning </title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 2s ease;
      overflow: hidden;
    }

    .container {
      text-align: center;
      background: rgba(255, 255, 255, 0.15);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      color: white;
      width: 85%;
      max-width: 900px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }

    .logos {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 20px;
      align-items: center;
    }

    .logo-card {
      background: rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 15px;
      transition: transform 0.3s ease;
    }

    .logo-card:hover {
      transform: scale(1.08);
    }

    .logo-card img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .logo-card h3 {
      font-size: 1rem;
      color: white;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🚀Sagar Wellcome To DevOps Learning </h1>
    <p>Learn Git, GitHub, CI/CD, Terraform, and AWS with hands-on practice.</p>

    <div class="logos">
      <div class="logo-card">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub Logo">
        <h3>GitHub</h3>
      </div>

      <div class="logo-card">
        <img src="https://cdn-icons-png.flaticon.com/512/4494/4494748.png" alt="CI/CD Logo">
        <h3>CI/CD</h3>
      </div>

      <div class="logo-card">
        <img src="https://git-scm.com/images/logos/downloads/Git-Icon-1788C.png" alt="Git Logo">
        <h3>Git</h3>
      </div>

      <div class="logo-card">
        <img src="https://www.vectorlogo.zone/logos/terraformio/terraformio-icon.svg" alt="Terraform Logo">
        <h3>Terraform</h3>
      </div>

      <div class="logo-card">
        <img src="https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png" alt="AWS Logo">
        <h3>AWS</h3>
      </div>
    </div>

    <footer>
      Made for DevOps Learning Practice 💻
    </footer>
  </div>

  <script>
    const colors = [
      '#1abc9c',
      '#3498db',
      '#9b59b6',
      '#e74c3c',
      '#f39c12',
      '#2ecc71',
      '#34495e'
    ];

    let index = 0;

    function changeBackground() {
      document.body.style.backgroundColor = colors[index];
      index = (index + 1) % colors.length;
    }

    changeBackground();
    setInterval(changeBackground, 2000);
  </script>

</body>
</html>
